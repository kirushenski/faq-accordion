name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: Install and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint TS
        run: npm run lint:ts:ci
      - name: Lint CSS
        run: npm run lint:css:ci
      - name: Check formatting
        run: npm run lint:format:ci
      - name: Check types
        run: npm run type-check
      - name: Run tests
        run: npm run test:coverage
